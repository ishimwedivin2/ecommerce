<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luz Technology - Integrated E-Commerce System</title>
  </head>
  <body>
    <div id="app">
      <!-- Header gets rendered here -->
      <div class="header-wrapper" id="app-header-container"></div>
      
      <!-- Category nav gets rendered here -->
      <div class="category-nav" id="app-category-nav-container"></div>
      
      <!-- Main view gets rendered here -->
      <main class="main-content" id="app-view-container"></main>

      <!-- Auth modal mounting point -->
      <div id="auth-modal-mount"></div>

      <!-- Cart side drawer mounting point -->
      <div id="cart-drawer-mount"></div>

      <!-- Support Live Chat Bubble & widget mount -->
      <div id="support-chat-widget-mount"></div>

      <!-- Site Footer -->
      <footer class="site-footer">
        <div class="footer-slim">
          <div class="footer-slim-brand">
            <img src="/logo.jpg" alt="Luz Technology" class="footer-logo-img">
            <span>Luz Technology<span style="color:var(--primary)">.</span></span>
          </div>
          <nav class="footer-slim-links">
            <a href="#">About</a>
            <a href="#">Support</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
          </nav>
          <span class="footer-slim-copy">© 2026 Luz Technology Ltd.</span>
        </div>
      </footer>
    </div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
