<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luz Technology - Integrated E-Commerce System</title>
  </head>
  <body>
    <div id="app">
      <!-- Header gets rendered here -->
      <div class="header-wrapper" id="app-header-container"></div>

      <!-- Category nav gets rendered here -->
      <div class="category-nav" id="app-category-nav-container"></div>

      <!-- Main view gets rendered here -->
      <main class="main-content" id="app-view-container"></main>

      <!-- Auth modal mounting point -->
      <div id="auth-modal-mount"></div>

      <!-- Cart side drawer mounting point -->
      <div id="cart-drawer-mount"></div>

      <!-- Support Live Chat Bubble & widget mount -->
      <div id="support-chat-widget-mount"></div>

      <!-- Footer gets rendered here -->
      <div id="app-footer-container"></div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
